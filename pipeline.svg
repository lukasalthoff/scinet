<line x1="340" y1="86" x2="340" y2="120" stroke="#666663" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="550" y1="86" x2="446" y2="120" stroke="#666663" stroke-width="1.5" marker-end="url(#arr)"/>


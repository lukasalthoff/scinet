<text x="261" y="687" text-anchor="middle" dominant-baseline="central" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#666663">OpenAlex (~474M)</text>
<text x="261" y="701" text-anchor="middle" dominant-baseline="central" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#666663">arXiv/bioRxiv (~3.5M)</text>

<rect x="336" y="650" width="130" height="76" rx="6" fill="#EDEDEA" stroke="#AAAAAA" stroke-width="1"/>

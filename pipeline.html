<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SciNET data creation pipeline</title>
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    background: #fff;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  svg { max-width: 720px; }

  .th { font-family: inherit; font-size: 14px; font-weight: 500; }
  .ts { font-family: inherit; font-size: 12px; font-weight: 400; }
  .th, .ts { fill: #2C2C2A; }

  .arr { stroke: #888780; stroke-width: 1.5; }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }

  .fill-purple { fill: #EEEDFE; stroke: #534AB7; }
  .fill-purple .th { fill: #3C3489; }
  .fill-purple .ts { fill: #534AB7; }

  .fill-teal { fill: #E1F5EE; stroke: #0F6E56; }
  .fill-teal .th { fill: #085041; }
  .fill-teal .ts { fill: #0F6E56; }

  .fill-green { fill: #EAF3DE; stroke: #3B6D11; }
  .fill-green .th { fill: #27500A; }
  .fill-green .ts { fill: #3B6D11; }

  .fill-pink { fill: #FBEAF0; stroke: #993556; }
  .fill-pink .th { fill: #72243E; }
  .fill-pink .ts { fill: #993556; }

  .fill-coral { fill: #FAECE7; stroke: #993C1D; }
  .fill-coral .th { fill: #712B13; }
  .fill-coral .ts { fill: #993C1D; }

  .fill-blue { fill: #E6F1FB; stroke: #185FA5; }
  .fill-blue .th { fill: #0C447C; }
  .fill-blue .ts { fill: #185FA5; }

  .fill-gray { fill: #F1EFE8; stroke: #5F5E5A; }
  .fill-gray .th { fill: #444441; }
  .fill-gray .ts { fill: #5F5E5A; }

  .dashed { fill: none; stroke: #B4B2A9; stroke-dasharray: 4 3; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 760">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<g class="fill-purple">
  <rect x="40" y="30" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="130" y="50" text-anchor="middle" dominant-baseline="central">OpenAlex taxonomy</text>
  <text class="ts" x="130" y="68" text-anchor="middle" dominant-baseline="central">Research topics</text>
</g>

<g class="fill-gray">
  <rect x="250" y="30" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">O*NET methodology</text>
  <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">Task statement format</text>
</g>

<g class="fill-gray">
  <rect x="460" y="30" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="50" text-anchor="middle" dominant-baseline="central">Engineered prompts</text>
  <text class="ts" x="550" y="68" text-anchor="middle" dominant-baseline="central">Coverage thresholds</text>
</g>

<line x1="130" y1="86" x2="270" y2="122" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="86" x2="340" y2="122" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="86" x2="410" y2="122" class="arr" marker-end="url(#arrow)"/>

<g class="fill-teal">
  <rect x="200" y="122" width="280" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="146" text-anchor="middle" dominant-baseline="central">LLM task generation</text>
</g>

<line x1="340" y1="170" x2="340" y2="208" class="arr" marker-end="url(#arrow)"/>

<g class="fill-teal">
  <rect x="80" y="208" width="520" height="240" rx="16" stroke-width="0.5"/>
  <text class="th" x="96" y="230" text-anchor="start">Domain</text>
  <text class="ts" x="96" y="246" text-anchor="start">5 domains · researcher-supervised</text>
</g>

<g class="fill-green">
  <rect x="100" y="258" width="480" height="175" rx="12" stroke-width="0.5"/>
  <text class="th" x="116" y="280" text-anchor="start">Field</text>
  <text class="ts" x="116" y="296" text-anchor="start">~30 fields · researcher-supervised</text>
</g>

<g class="fill-purple">
  <rect x="120" y="308" width="440" height="110" rx="10" stroke-width="0.5"/>
  <text class="th" x="136" y="330" text-anchor="start">Subfield</text>
  <text class="ts" x="136" y="346" text-anchor="start">~300 subfields · unsupervised, 70 percent coverage</text>
</g>

<g class="fill-pink">
  <rect x="140" y="358" width="400" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="156" y="374" text-anchor="start" dominant-baseline="central">Topic</text>
  <text class="ts" x="156" y="392" text-anchor="start" dominant-baseline="central">~4,500 topics · unsupervised, 80 percent coverage</text>
</g>

<line x1="340" y1="448" x2="340" y2="486" class="arr" marker-end="url(#arrow)"/>

<rect x="50" y="486" width="580" height="104" rx="12" class="dashed" stroke-width="0.5"/>
<text class="th" x="340" y="506" text-anchor="middle">Validation</text>

<g class="fill-coral">
  <rect x="60" y="516" width="186" height="64" rx="6" stroke-width="0.5"/>
  <text class="th" x="153" y="534" text-anchor="middle" dominant-baseline="central">Research protocols</text>
  <text class="ts" x="153" y="552" text-anchor="middle" dominant-baseline="central">protocols.io (20,600)</text>
  <text class="ts" x="153" y="568" text-anchor="middle" dominant-baseline="central">Bio-protocol (85,000)</text>
</g>

<g class="fill-coral">
  <rect x="256" y="516" width="186" height="64" rx="6" stroke-width="0.5"/>
  <text class="th" x="349" y="534" text-anchor="middle" dominant-baseline="central">Scientific papers</text>
  <text class="ts" x="349" y="552" text-anchor="middle" dominant-baseline="central">OpenAlex, arXiv, etc.</text>
</g>

<g class="fill-coral">
  <rect x="452" y="516" width="168" height="64" rx="6" stroke-width="0.5"/>
  <text class="th" x="536" y="548" text-anchor="middle" dominant-baseline="central">Patent filings</text>
</g>

<line x1="340" y1="590" x2="340" y2="638" class="arr" marker-end="url(#arrow)"/>

<g class="fill-blue">
  <rect x="150" y="638" width="380" height="80" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="660" text-anchor="middle" dominant-baseline="central">SciNET</text>
  <text class="ts" x="340" y="680" text-anchor="middle" dominant-baseline="central">5 domains · 30 fields · 300 subfields</text>
  <text class="ts" x="340" y="696" text-anchor="middle" dominant-baseline="central">4,516 topics · 7,828 tasks</text>
</g>

<rect x="40" y="638" width="100" height="80" rx="8" class="dashed" stroke-width="0.5"/>
<text class="th" x="90" y="656" text-anchor="middle">Enrichment</text>
<text class="ts" x="90" y="672" text-anchor="middle">Task ratings</text>
<text class="ts" x="90" y="688" text-anchor="middle">AI exposure</text>
<text class="ts" x="90" y="704" text-anchor="middle">Expert surveys</text>

<line x1="140" y1="678" x2="148" y2="678" class="arr" marker-end="url(#arrow)"/>

</svg>
</body>
</html>
